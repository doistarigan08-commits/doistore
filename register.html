<!DOCTYPE html>
<html>
<body>

<h2>Registrasi</h2>

<input id="user" placeholder="Buat Username"><br><br>
<input id="pass" type="password" placeholder="Buat Password"><br><br>

<button onclick="daftar()">DAFTAR</button>

<script>
function daftar() {
  localStorage.setItem("username", user.value);
  localStorage.setItem("password", pass.value);

  alert("Akun berhasil dibuat!");
  
  window.location.href = "login.html"; // pindah ke login
}
</script>

</body>
</html>
